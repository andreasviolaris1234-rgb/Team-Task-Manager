services:
  task-manager:
    build: .
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET to at least 32 random characters}
      AUTH_RATE_LIMIT: ${AUTH_RATE_LIMIT:-10}
    volumes:
      - task-manager-data:/app/data
    restart: unless-stopped

volumes:
  task-manager-data:
